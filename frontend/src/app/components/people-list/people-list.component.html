<section class="card">
  <div class="header-row">
    <div>
      <h2>All People</h2>
      <p class="subtitle">Simple list view connected to the REST API.</p>
    </div>
    <button class="refresh-btn" (click)="loadPeople()">Refresh</button>
  </div>

  <p *ngIf="loading" class="state-text">Loading people...</p>
  <p *ngIf="error" class="error-text">{{ error }}</p>

  <div *ngIf="!loading && !error && people.length === 0" class="empty-box">
    No people found.
  </div>

  <div class="table-wrap" *ngIf="!loading && people.length > 0">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let person of people">
          <td>{{ person.id }}</td>
          <td>{{ person.firstName }}</td>
          <td>{{ person.lastName }}</td>
          <td>{{ person.email }}</td>
          <td>{{ person.phone }}</td>
          <td class="actions">
            <a class="action edit" [routerLink]="['/people', person.id, 'edit']">Edit</a>
            <a class="action delete" [routerLink]="['/people', person.id, 'delete']">Delete</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
